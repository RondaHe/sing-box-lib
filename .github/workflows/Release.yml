name: Release

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "选择内核 (source repo)"
        required: true
        type: choice
        default: "KaringX/sing-box"
        options:
          - "KaringX/sing-box"
          - "SagerNet/sing-box"
      tag:
        description: "git tag/分支 (KaringX 如 2102 / SagerNet 如 v1.14.0-alpha.39)"
        required: true
        type: string
        default: "2102"
      version:
        description: "产物版本名：会作为 GitHub Release 的标题+tag，也是下载/SPM 引用的版本号（两种内核务必用不同名，别互相覆盖）"
        required: true
        type: string
        default: "karing-2102"

jobs:
  release:
    runs-on: macOS-15

    # Allow the workflow to push tags/commits back to the repo
    permissions:
      contents: write

    steps:
      # --- Check out main repository (actions/checkout@v4) ---
      - uses: actions/checkout@v7

      # --- Check out sing-box source at the requested tag ---
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.inputs.repository }}
          path: box
          ref: ${{ github.event.inputs.tag }}

      # --- Set up Go (actions/setup-go@v5) ---
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.7"

      # --- Install gomobile toolchain ---
      - name: Setup Gomobile
        run: |
          cd box
          make lib_install
          gomobile init

      # --- Build the iOS xcframework ---
      - name: Build xcframework
        run: |
          cd box
          go run ./cmd/internal/build_libbox -target apple -platform ios
          zip -ry ./Libbox.xcframework.zip ./Libbox.xcframework

      # --- Generate SHA‑256 checksum for the archive ---
      - name: Detect checksum
        id: checksum
        shell: bash
        run: |
          CHECKSUM=$(shasum -a 256 box/Libbox.xcframework.zip | awk '{print $1}')
          echo "file_checksum=$CHECKSUM" >> "$GITHUB_ENV"

      # --- Generate SwiftPM manifest that points at the new binary target ---
      - name: Update Package.swift
        shell: bash
        run: |
          cat > Package.swift <<EOF
          // swift-tools-version: 5.7

          import PackageDescription

          let package = Package(
            name: "Libbox",
            platforms: [.iOS(.v12)],
            products: [
              .library(name: "Libbox", targets: ["Libbox"]),
            ],
            targets: [
              .binaryTarget(
                name: "Libbox",
                url: "https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/Libbox.xcframework.zip",
                checksum: "${{ env.file_checksum }}"
              )
            ]
          )
          EOF

      # --- Commit manifest + tag, then push ONLY the tag.
      #     Pushing just the tag (not main) avoids non-fast-forward races when
      #     main moved during the run; the tag carries the updated Package.swift
      #     so SPM resolves correctly. -f lets re-runs overwrite the tag. ---
      - name: Tag manifest
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "Libbox Release ${{ github.event.inputs.version }}"
          git tag -f "${{ github.event.inputs.version }}"
          git push -f origin "refs/tags/${{ github.event.inputs.version }}"

      # --- Publish GitHub release (attaches the xcframework to the tag above) ---
      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          tag_name: ${{ github.event.inputs.version }}
          body: "Compiled from ${{ github.event.inputs.repository }} @ ${{ github.event.inputs.tag }}"
          files: box/Libbox.xcframework.zip
